# This clean rebuild intentionally preserves the reference app behavior first.
# The temporary ignores below keep `flutter analyze` focused on compile-time
# errors while the large part-based migration is stabilized. Future cleanup can
# remove these one by one as features are converted to real controllers/services.
include: package:flutter_lints/flutter.yaml

analyzer:
  errors:
    deprecated_member_use: ignore
    invalid_use_of_protected_member: ignore
    unused_element: ignore
    unused_element_parameter: ignore
    unused_field: ignore
    unused_local_variable: ignore
    unnecessary_cast: ignore
    unnecessary_import: ignore
    unnecessary_non_null_assertion: ignore
    use_build_context_synchronously: ignore
    library_private_types_in_public_api: ignore
    overridden_fields: ignore
    annotate_overrides: ignore
    avoid_print: ignore
    curly_braces_in_flow_control_structures: ignore
    prefer_const_constructors: ignore
    prefer_const_declarations: ignore
    prefer_const_literals_to_create_immutables: ignore
    prefer_interpolation_to_compose_strings: ignore
    unnecessary_brace_in_string_interps: ignore

linter:
  rules:
    avoid_print: false
    curly_braces_in_flow_control_structures: false
    prefer_const_constructors: false
    prefer_const_declarations: false
    prefer_const_literals_to_create_immutables: false
    prefer_interpolation_to_compose_strings: false
    unnecessary_brace_in_string_interps: false
    use_build_context_synchronously: false
