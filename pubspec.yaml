name: musix
description: "Infame — a Google Drive music player for the trenches."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  just_audio: ^0.9.42
  audio_service: ^0.18.17
  googleapis: ^13.2.0
  google_sign_in: ^6.2.1
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.0
  palette_generator: ^0.3.3+7
  audio_metadata_reader: ^1.6.0
  path_provider: ^2.1.5
  flutter_foreground_task: ^9.2.2
  http: ^1.6.0
  volume_controller: ^3.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  

flutter:
  uses-material-design: true
